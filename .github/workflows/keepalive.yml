name: Keep Streamlit Demo Warm

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping deployed Streamlit app
        run: |
          status=$(curl --silent --show-error --max-time 60 --output /dev/null --write-out "%{http_code}" \
            "https://ai-data-analyst-agent-hc3rs5gwg8nxvyru2qjz3q.streamlit.app/?keepalive=github-actions")
          echo "Streamlit keepalive HTTP status: ${status}"
          if [ "${status}" -ge 200 ] && [ "${status}" -lt 400 ]; then
            exit 0
          fi
          exit 1
